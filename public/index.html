<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0052FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coinexs">
  <meta name="description" content="Coinexs - Your Money, Without Borders">
  <link rel="manifest" href="manifest.json?v=1">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-48.png?v=1">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon-192.png?v=1">
  <link rel="apple-touch-icon" href="assets/images/favicon-192.png?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=1">
  <link rel="stylesheet" href="css/global.css?v=1">
  <link rel="stylesheet" href="css/animations.css?v=1">
  <link rel="stylesheet" href="css/pages.css?v=1">
  <link rel="stylesheet" href="css/modals.css?v=1">
  <link rel="stylesheet" href="css/admin.css?v=1">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="https://cdn.lordicon.com/lordicon.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.12/dist/lottie-player.js"></script>
  <title>Coinexs</title>
  <script>
    (function() {
      var t = localStorage.getItem('coinexs_theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body>
  <div id="app" class="app-container"></div>
  <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main navigation"></nav>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="modal-root" class="modal-root"></div>
  <script src="js/data.js?v=1"></script>
  <script src="js/anim.js?v=1"></script>
  <script src="js/components.js?v=1"></script>
  <script src="js/router.js?v=1"></script>
  <script src="js/admin.js?v=1"></script>
  <script src="js/app.js?v=1"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(r => r.forEach(s => s.unregister()));
    }
  </script>
</body>
</html>
